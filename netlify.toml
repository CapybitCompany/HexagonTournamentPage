[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "http://minecrafthex.pl/*"
  to = "https://www.minecrafthex.pl/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://minecrafthex.pl/*"
  to = "https://www.minecrafthex.pl/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.minecrafthex.pl/*"
  to = "https://www.minecrafthex.pl/:splat"
  status = 301

[[redirects]]
  from = "/hexHardcoreSsmp"
  to = "/hexHardcoreSmp"
  status = 301
  force = true
  force = true

# =============================================================================
# Cache-Control headers
# Netlify domyślnie serwuje statyczne zasoby z kompresją gzip + brotli,
# więc nie musimy jawnie konfigurować kompresji. Poniżej ustawiamy tylko
# długoterminowy cache dla assetów z hashowanymi nazwami (immutable) oraz
# dłuższy TTL dla fontów/obrazów/video.
# =============================================================================

# Astro hashed assets (JS/CSS/fonts z unikalnymi nazwami) - cache na rok
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonty (same pliki w /public) - cache na rok
[[headers]]
  for = "/Montserrat/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/Roboto/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/minecraft-font/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Obrazy statyczne - 30 dni z rewalidacją
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# Video - 30 dni
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# HTML - revaliduj po 10 min (pozwala na szybkie aktualizacje treści)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

# Globalne security / performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"